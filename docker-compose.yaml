version: '3.8'

services:
  backend:
    build: .
    container_name: study-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcloud/application_default_credentials.json
    volumes:
      - ./study.gemini.md:/app/study.gemini.md
      - ./ai-output:/app/output
      - ~/.config/gcloud:/gcloud
    networks:
      - ai-network

networks:
  ai-network:
    external: true